spring:
  application:
    name: auth-guide

  # ─────────────────────────────────────────────────────────────────────
  # [패턴 전환] 아래 한 줄만 바꾸면 JWT 저장 방식이 바뀐다.
  #
  #  cookie      : Access + Refresh → HttpOnly 쿠키 (XSS 방어, 현업 표준)
  #  memory      : Access → JS 변수(탭 닫으면 소멸), Refresh → HttpOnly 쿠키
  #  localstorage: Access + Refresh → localStorage (⚠️ XSS 취약, 학습용)
  # ─────────────────────────────────────────────────────────────────────
  profiles:
    active: cookie

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET:}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - profile_image
              - account_email
            client-name: Kakao

          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - name
              - email
              - profile_image
            client-name: Naver

        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/authguide}
    username: ${DB_USERNAME:authuser}
    password: ${DB_PASSWORD:authpass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiry-ms: 900000    # 15분
  refresh-token-expiry-ms: 604800000 # 7일

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: DEBUG
