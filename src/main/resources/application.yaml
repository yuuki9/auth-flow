spring:
  application:
    name: auth-guide
  
  security:
    oauth2:
      client:
        registration:
          # Google OAuth 2.0
          google:
            client-id: 560940701289-p8ub6tji6d9immb0ni0gb5npk4sel15e.apps.googleusercontent.com
            client-secret: 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
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
          
          # Kakao OAuth 2.0
          kakao:
            client-id: ac7d84a19f3e30b6d1b4ea79f5dde963
            client-secret: GhaQEJZNnAfBrt7gFjfWyX3BHtvoxHOc
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - profile_image
              - account_email
            client-name: Kakao
          
          # Naver OAuth 2.0
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - name
              - email
              - profile_image
            client-name: Naver
        
        # Provider 설정 (Google은 내장, Kakao와 Naver는 직접 설정)
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

# 로깅 설정 (OAuth 디버깅용)
logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: DEBUG
