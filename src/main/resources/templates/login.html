<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - OAuth 2.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 14px;
        }
        
        .social-login {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .social-login a {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px 20px;
            border: 2px solid #ddd;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
            font-size: 16px;
        }
        
        .social-login a:hover {
            transform: translateY(-2px);
        }
        
        .btn-google {
            background: white;
            color: #333;
        }
        
        .btn-google:hover {
            border-color: #4285f4;
            box-shadow: 0 5px 20px rgba(66, 133, 244, 0.2);
        }
        
        .btn-kakao {
            background: #FEE500;
            color: #000000;
            border-color: #FEE500;
        }
        
        .btn-kakao:hover {
            background: #FDD835;
            border-color: #FDD835;
            box-shadow: 0 5px 20px rgba(254, 229, 0, 0.3);
        }
        
        .btn-naver {
            background: #03C75A;
            color: white;
            border-color: #03C75A;
        }
        
        .btn-naver:hover {
            background: #02B350;
            border-color: #02B350;
            box-shadow: 0 5px 20px rgba(3, 199, 90, 0.3);
        }
        
        .social-login svg {
            width: 24px;
            height: 24px;
            margin-right: 10px;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
        
        .info-box {
            margin-top: 30px;
            padding: 20px;
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            border-radius: 5px;
            text-align: left;
            font-size: 13px;
            color: #856404;
        }
        
        .info-box strong {
            display: block;
            margin-bottom: 10px;
            color: #856404;
        }
        
        .info-box p {
            margin: 5px 0;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>로그인</h1>
        <p class="subtitle">소셜 계정으로 간편하게 로그인하세요</p>
        
        <div class="social-login">
            <!-- Google 로그인 -->
            <a href="/oauth2/authorization/google" class="btn-google">
                <svg width="24" height="24" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                구글로 로그인
            </a>
            
            <!-- Kakao 로그인 -->
            <a href="/oauth2/authorization/kakao" class="btn-kakao">
                <svg width="24" height="24" viewBox="0 0 24 24">
                    <path fill="#000000" d="M12 3C6.48 3 2 6.58 2 11c0 2.8 1.83 5.26 4.58 6.7-.2.74-.74 2.65-.84 3.08-.13.53.19.52.4.38.16-.11 2.5-1.72 3.45-2.37.79.11 1.6.17 2.41.17 5.52 0 10-3.58 10-8S17.52 3 12 3z"/>
                </svg>
                카카오로 로그인
            </a>
            
            <!-- Naver 로그인 -->
            <a href="/oauth2/authorization/naver" class="btn-naver">
                <svg width="24" height="24" viewBox="0 0 24 24">
                    <path fill="white" d="M16.273 12.845L7.376 0H0v24h7.726V11.156L16.624 24H24V0h-7.727z"/>
                </svg>
                네이버로 로그인
            </a>
        </div>
        
        <a href="/" class="back-link">← 메인으로 돌아가기</a>
        
        <div class="info-box">
            <strong>⚙️ OAuth 설정 필요:</strong>
            <p>• Google: Google Cloud Console</p>
            <p>• Kakao: Kakao Developers</p>
            <p>• Naver: Naver Developers</p>
            <p style="margin-top: 10px;">리다이렉트 URI: <br><code style="background: #f8f9fa; padding: 2px 5px; border-radius: 3px;">http://localhost:8080/login/oauth2/code/{provider}</code></p>
        </div>
    </div>
</body>
</html>
